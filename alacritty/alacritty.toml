general.import = [
  "~/dotfiles/alacritty/gruvbox-dark.toml",
  "~/dotfiles/alacritty/alacritty.local.toml",
]

[bell]
animation = "EaseOutExpo"
duration = 0

[colors]
draw_bold_text_with_bright_colors = true

[cursor]
style = { blinking = "Always", shape = "Block" }
blink_interval = 1750
thickness = 0.15

[font.glyph_offset]
x = 0
y = 1

[font.normal]
family = "MesloLGS NF"

[font.offset]
x = 1
y = 2

[mouse]
hide_when_typing = true

[scrolling]
history = 10000
multiplier = 3

[window]
decorations = "Buttonless"
dynamic_padding = true
blur = true
option_as_alt = "OnlyLeft"

[window.dimensions]
columns = 120
lines = 40

[window.padding]
x = 2
y = 2

[[keyboard.bindings]]
chars = "\u001Be"
key = "E"
mods = "Alt"

[[keyboard.bindings]]
chars = "\u001Bs"
key = "S"
mods = "Alt"

[[keyboard.bindings]]
chars = "\u001Bv"
key = "V"
mods = "Alt"

[[keyboard.bindings]]
chars = "\u001Bx"
key = "X"
mods = "Alt"

[[keyboard.bindings]]
chars = "\u001Bw"
key = "W"
mods = "Alt"

[[keyboard.bindings]]
chars = "\u001Bc"
key = "C"
mods = "Alt"

[[keyboard.bindings]]
chars = "\u001E"
key = "Key6"
mods = "Control"

[[keyboard.bindings]]
chars = "\u001b[59;5u"
key = "Semicolon"
mods = "Control"

[[keyboard.bindings]]
chars = "\u001b[44;5u"
key = "Comma"
mods = "Control"

---
- name: Create symlinks
  vars:
    dotfiles: "{{ ansible_env.HOME }}/dotfiles"
    xdg_config_home: "{{ lookup('env', 'XDG_CONFIG_HOME', default=ansible_env.HOME + '/.config') }}"
  ansible.builtin.file:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    state: link
    force: true
  loop:
    - src: "{{ dotfiles }}/hypr/.config/hypr"
      dest: "{{ xdg_config_home }}/hypr"
    - src: "{{ dotfiles }}/alacritty/.config/alacritty"
      dest: "{{ xdg_config_home }}/alacritty"
    - src: "{{ dotfiles }}/nvim/.config/nvim"
      dest: "{{ xdg_config_home }}/nvim"
    - src: "{{ dotfiles }}/bat/.config/bat"
      dest: "{{ xdg_config_home }}/bat"
    - src: "{{ dotfiles }}/tmux/tmux.conf"
      dest: "{{ ansible_env.HOME }}/.tmux.conf"
    - src: "{{ dotfiles }}/zsh/zsh/.zshenv"
      dest: "{{ ansible_env.HOME }}/.zshenv"
